<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F4E79">
<title>常用工具區 - 船舶管理</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

:root {
  --bg: #f5f5f7;
  --bg-elevated: #ffffff;
  --bg-grouped: #f2f2f7;
  --separator: rgba(60, 60, 67, 0.12);
  --text: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #86868b;
  --tint: #0071e3;
  --shadow-soft: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-hover: 0 2px 6px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.08);
}

[data-theme="dark"] {
  --bg: #000000;
  --bg-elevated: #1c1c1e;
  --bg-grouped: #2c2c2e;
  --separator: rgba(84, 84, 88, 0.45);
  --text: #f2f2f7;
  --text-secondary: #aeaeb2;
  --text-tertiary: #8e8e93;
  --tint: #0a84ff;
  --shadow-soft: 0 1px 2px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.25);
  --shadow-hover: 0 2px 6px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.35);
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --bg: #000000;
    --bg-elevated: #1c1c1e;
    --bg-grouped: #2c2c2e;
    --separator: rgba(84, 84, 88, 0.45);
    --text: #f2f2f7;
    --text-secondary: #aeaeb2;
    --text-tertiary: #8e8e93;
    --tint: #0a84ff;
    --shadow-soft: 0 1px 2px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.25);
    --shadow-hover: 0 2px 6px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.35);
  }
}

html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang TC", "Microsoft JhengHei", sans-serif;
  letter-spacing: -0.01em;
  min-height: 100vh;
}

.container {
  max-width: 820px;
  margin: 0 auto;
  padding: 20px 0 40px;
}

.theme-toggle {
  position: fixed; top: 14px; right: 14px;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-elevated);
  color: var(--text);
  border: 0.5px solid var(--separator);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: var(--shadow-soft);
  transition: transform 0.18s, box-shadow 0.2s;
  z-index: 100;
}
.theme-toggle:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
.theme-toggle:active { transform: scale(0.94); }

.tools-hero {
  margin: 8px 12px 16px;
  padding: 22px 18px;
  background: var(--bg-elevated);
  border-radius: 14px;
  text-align: center;
  box-shadow: var(--shadow-soft);
}
.th-title {
  font-size: 22px; font-weight: 600;
  color: var(--text); letter-spacing: -0.022em;
  display: inline-flex; align-items: center; gap: 8px;
}
.th-sub { font-size: 13px; color: var(--text-tertiary); margin-top: 6px; }

.tools-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 0 12px;
}

@media (min-width: 640px) {
  .tools-grid { grid-template-columns: repeat(4, 1fr); }
}

.tool-card {
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  background: var(--bg-elevated);
  border: 0;
  border-radius: 14px;
  padding: 22px 12px 18px;
  text-decoration: none;
  color: inherit;
  transition: transform 0.18s cubic-bezier(.2,.8,.2,1), box-shadow 0.2s;
  box-shadow: var(--shadow-soft);
}
.tool-card:active { transform: scale(0.97); }
.tool-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }

.tool-icon {
  margin-bottom: 10px;
  width: 60px; height: 60px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-grouped);
}
.tool-card[data-th="t1"] .tool-icon { background: rgba(0, 113, 227, 0.10); color: #0071e3; }
.tool-card[data-th="t2"] .tool-icon { background: rgba(90, 200, 250, 0.16); color: #1d9bcf; }
.tool-card[data-th="t3"] .tool-icon { background: rgba(175, 82, 222, 0.12); color: #af52de; }
.tool-card[data-th="t4"] .tool-icon { background: rgba(255, 59, 48, 0.10); color: #ff3b30; }
.tool-card[data-th="t5"] .tool-icon { background: rgba(88, 86, 214, 0.12); color: #5856d6; }
.tool-card[data-th="t6"] .tool-icon { background: rgba(52, 199, 89, 0.12); color: #34c759; }
.tool-card[data-th="t7"] .tool-icon { background: rgba(255, 149, 0, 0.12); color: #ff9500; }
.tool-card[data-th="t8"] .tool-icon { background: rgba(0, 180, 163, 0.12); color: #00b4a3; }

.tool-name { font-size: 14px; font-weight: 600; color: var(--text); }
.tool-desc { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }

.ico { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="切換主題">
  <svg id="themeIcon" class="ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
  </svg>
</button>

<div class="container">
  <div class="tools-hero">
    <div class="th-title">
      <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      保船常用工具
    </div>
    <div class="th-sub">點擊卡片即開啟對應線上工具（新分頁）</div>
  </div>

  <div class="tools-grid">
    <a class="tool-card" data-th="t1" href="https://rextu99.github.io/Bulletin-/" target="_blank" rel="noopener">
      <div class="tool-icon">
        <svg class="ico" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
        </svg>
      </div>
      <div class="tool-name">佈告欄查詢</div>
      <div class="tool-desc">公告與佈告欄目錄</div>
    </a>

    <a class="tool-card" data-th="t2" href="https://rextu99.github.io/Visiting-ship-calculation-tool/" target="_blank" rel="noopener">
      <div class="tool-icon">
        <svg class="ico" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="4" y="2" width="16" height="20" rx="2"/>
          <line x1="8" y1="6" x2="16" y2="6"/>
          <line x1="8" y1="10" x2="8.01" y2="10"/>
          <line x1="12" y1="10" x2="12.01" y2="10"/>
          <line x1="16" y1="10" x2="16.01" y2="10"/>
          <line x1="8" y1="14" x2="8.01" y2="14"/>
          <line x1="12" y1="14" x2="12.01" y2="14"/>
          <line x1="16" y1="14" x2="16.01" y2="14"/>
          <line x1="8" y1="18" x2="16" y2="18"/>
        </svg>
      </div>
      <div class="tool-name">訪船差假試算</div>
      <div class="tool-desc">出差日數/差假計算</div>
    </a>

    <a class="tool-card" data-th="t3" href="https://rextu99.github.io/ship_hull_coating_design/" target="_blank" rel="noopener">
      <div class="tool-icon">
        <svg class="ico" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="13.5" cy="6.5" r=".5"/>
          <circle cx="17.5" cy="10.5" r=".5"/>
          <circle cx="8.5" cy="7.5" r=".5"/>
          <circle cx="6.5" cy="12.5" r=".5"/>
          <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
        </svg>
      </div>
      <div class="tool-name">外板油漆膜厚</div>
      <div class="tool-desc">船殼塗裝設計</div>
    </a>

    <a class="tool-card" data-th="t4" href="https://rextu99.github.io/PSC-Code/" target="_blank" rel="noopener">
      <div class="tool-icon">
        <svg class="ico" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <div class="tool-name">PSC Code 查詢</div>
      <div class="tool-desc">PSC 缺失代碼速查</div>
    </a>

    <a class="tool-card" data-th="t5" href="https://rextu99.github.io/vessel_information/" target="_blank" rel="noopener">
      <div class="tool-icon">
        <svg class="ico" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 2 L15 2 L14 5 L10 5 Z"/>
          <rect x="5" y="6" width="14" height="6" rx="0.4"/>
          <line x1="5" y1="9" x2="19" y2="9"/>
          <line x1="8.5" y1="6" x2="8.5" y2="12"/>
          <line x1="12" y1="6" x2="12" y2="12"/>
          <line x1="15.5" y1="6" x2="15.5" y2="12"/>
          <path d="M3 13 L21 13 L17 18 L7 18 Z"/>
          <circle cx="10" cy="15.5" r="0.6" fill="currentColor" stroke="none"/>
          <circle cx="14" cy="15.5" r="0.6" fill="currentColor" stroke="none"/>
          <path d="M2 20 C 4 19, 6 19, 8 20 S 12 21, 14 20 S 18 19, 20 20"/>
          <path d="M2 22 C 4 21, 6 21, 8 22 S 12 23, 14 22 S 18 21, 20 22"/>
        </svg>
      </div>
      <div class="tool-name">船舶資訊查詢</div>
      <div class="tool-desc">船舶基本資料</div>
    </a>

    <a class="tool-card" data-th="t6" href="https://rextu99.github.io/onboard-check-list3/" target="_blank" rel="noopener">
      <div class="tool-icon">
        <svg class="ico" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <div class="tool-name">訪船檢查報告</div>
      <div class="tool-desc">登輪檢查表單</div>
    </a>

    <a class="tool-card" data-th="t7" href="https://rextu99.github.io/VSL-SCHEDULE/" target="_blank" rel="noopener">
      <div class="tool-icon">
        <svg class="ico" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <div class="tool-name">船期查詢</div>
      <div class="tool-desc">航線船期表</div>
    </a>

    <a class="tool-card" data-th="t8" href="https://rextu99.github.io/Emission-Control-Areas-Map/" target="_blank" rel="noopener">
      <div class="tool-icon">
        <svg class="ico" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <div class="tool-name">脫硫使用規範</div>
      <div class="tool-desc">ECA 區域與規範</div>
    </a>
  </div>
</div>

<script>
(function () {
  const root = document.documentElement;
  const btn = document.getElementById('themeToggle');
  const icon = document.getElementById('themeIcon');

  const sunPaths = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
  const moonPath = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    icon.innerHTML = theme === 'dark' ? sunPaths : moonPath;
  }

  const saved = localStorage.getItem('toolbox-theme');
  const initial = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(initial);

  btn.addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('toolbox-theme', next);
  });
})();
</script>

</body>
</html>
